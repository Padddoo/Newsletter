name: briefing

on:
  schedule:
    # Täglich 06:07 UTC (= 08:07 Berlin Sommerzeit). Bewusst NICHT auf der vollen
    # Stunde: GitHub überlastet :00-Slots und überspringt/verzögert sie häufig.
    # GitHub-Cron läuft in UTC und kann sich generell um einige Minuten verspäten.
    - cron: "7 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write        # für state/seen_ids.json commit

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python src/run.py

      - name: Commit updated state
        run: |
          git config user.name "news-agent"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen_ids.json
          if git diff --staged --quiet; then
            echo "Keine State-Änderung."
          else
            git commit -m "chore: update seen_ids"
            git push
          fi

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: output/dashboard.html
          retention-days: 7
