name: briefing

on:
  schedule:
    # Täglich 06:00 UTC. Hinweis: GitHub-Cron läuft in UTC und kann sich um
    # einige Minuten verspäten. Für "09:00 Berlin" je nach Sommer-/Winterzeit
    # 0 7 bzw. 0 8 wählen.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write        # für state/seen_ids.json commit
  pages: write           # für Pages-Deploy
  id-token: write        # für deploy-pages

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python src/run.py

      - name: Commit updated state
        run: |
          git config user.name "news-agent"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen_ids.json
          if git diff --staged --quiet; then
            echo "Keine State-Änderung."
          else
            git commit -m "chore: update seen_ids"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
