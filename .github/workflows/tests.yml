name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Die Tests stubben externe Libs selbst -> kein pip install nötig.
      - name: Run unittests
        run: python -m unittest discover -s tests -p "test_*.py" -v
